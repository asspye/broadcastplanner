services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      BP_ADDR: ":8080"
      # Milestone 2 wiring (not yet consumed by the code):
      DATABASE_URL: "postgres://bp:bp@db:5432/broadcastplanner?sslmode=disable"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "bpadmin"
      S3_SECRET_KEY: "bpadminsecret"
      S3_BUCKET: "media"
    depends_on:
      - db
      - minio

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bp
      POSTGRES_PASSWORD: bp
      POSTGRES_DB: broadcastplanner
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  # S3-compatible object storage for media (replaces the NAS mount from the
  # original macOS app). rename/relink/sync become object operations here.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bpadmin
      MINIO_ROOT_PASSWORD: bpadminsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  db-data:
  minio-data:
